<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Noise Remover</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 36px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    .header {
      background: #1F4E79;
      color: white;
      border-radius: 8px;
      padding: 20px 24px;
      margin-bottom: 28px;
    }
    .header h1 { font-size: 22px; margin-bottom: 4px; }
    .header p  { font-size: 13px; color: #B0D0F0; font-style: italic; }
    .section { margin-bottom: 24px; }
    .section-title {
      font-size: 13px;
      font-weight: bold;
      color: #1F4E79;
      margin-bottom: 10px;
    }
    .file-row {
      display: flex;
      gap: 8px;
    }
    .file-input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #C8D8E8;
      border-radius: 6px;
      font-size: 13px;
      color: #333;
      background: #F8FAFC;
      cursor: pointer;
    }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    input[type=range] {
      flex: 1;
      accent-color: #2E75B6;
      height: 6px;
    }
    .strength-badge {
      font-size: 22px;
      font-weight: bold;
      color: #F1C40F;
      min-width: 40px;
      text-align: center;
    }
    .hint-row {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }
    .hint {
      flex: 1;
      text-align: center;
      padding: 4px 0;
      border-radius: 4px;
      font-size: 11px;
      color: white;
      font-weight: bold;
    }
    .hint.light  { background: #27AE60; }
    .hint.medium { background: #F1C40F; color: #333; }
    .hint.strong { background: #E74C3C; }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-blue  { background: #1F4E79; color: white; }
    .btn-green { background: #27AE60; color: white; margin-top: 12px; display: none; }
    .progress-wrap {
      margin-top: 14px;
      display: none;
    }
    progress {
      width: 100%;
      height: 14px;
      border-radius: 8px;
      accent-color: #2E75B6;
    }
    .status {
      font-size: 12px;
      color: #888;
      margin-top: 6px;
      text-align: center;
    }
    .results {
      display: none;
      background: #F0F7FF;
      border: 1px solid #C8D8E8;
      border-radius: 8px;
      padding: 16px;
      margin-top: 20px;
    }
    .results-title {
      font-size: 13px;
      font-weight: bold;
      color: #1F4E79;
      margin-bottom: 10px;
    }
    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 16px;
      font-size: 13px;
    }
    .results-grid .key { color: #666; font-weight: bold; }
    .results-grid .val { color: #222; }
    .tick-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #888;
      margin-top: 2px;
      padding: 0 2px;
    }
  </style>
</head>
<body>
<div class="card">

  <div class="header">
    <h1>Background Noise Remover</h1>
    <p>Powered by Spectral Subtraction</p>
  </div>

  <!-- FILE SELECTION -->
  <div class="section">
    <div class="section-title">1. Select Input File</div>
    <div class="file-row">
      <input class="file-input" type="file" id="fileInput" accept=".mp4,.wav">
    </div>
  </div>

  <!-- STRENGTH SLIDER -->
  <div class="section">
    <div class="section-title">2. Noise Removal Strength</div>
    <div class="slider-row">
      <input type="range" id="strengthSlider" min="0" max="6" step="1" value="3">
      <div class="strength-badge" id="strengthBadge">1.5</div>
    </div>
    <div class="tick-labels">
      <span>0</span><span>0.5</span><span>1</span><span>1.5</span>
      <span>2</span><span>2.5</span><span>3</span>
    </div>
    <div class="hint-row">
      <div class="hint light">Light (0–1)</div>
      <div class="hint medium">Medium (1–2)</div>
      <div class="hint strong">Strong (2–3)</div>
    </div>
  </div>

  <!-- PROCESS BUTTON -->
  <div class="section">
    <div class="section-title">3. Remove Noise</div>
    <button class="btn btn-blue" id="processBtn">Convert + Remove Noise</button>
    <div class="progress-wrap" id="progressWrap">
      <progress id="progressBar" value="0" max="100"></progress>
      <div class="status" id="statusLabel">Starting...</div>
    </div>
    <button class="btn btn-green" id="downloadBtn">Download Clean Audio</button>
  </div>

  <!-- RESULTS -->
  <div class="results" id="resultsBox">
    <div class="results-title">4. Cleaned Audio</div>
    <div class="results-grid">
      <div class="key">Output File:</div><div class="val" id="rFile">—</div>
      <div class="key">File Size:</div><div class="val" id="rSize">—</div>
      <div class="key">Duration:</div><div class="val" id="rDuration">—</div>
      <div class="key">Strength Used:</div><div class="val" id="rStrength">—</div>
    </div>
  </div>

</div>

<script>
  const slider = document.getElementById('strengthSlider');
  const badge  = document.getElementById('strengthBadge');
  const values = [0, 0.5, 1, 1.5, 2, 2.5, 3];

  // Update badge color based on strength
  function updateBadge(val) {
    badge.textContent = val;
    if (val <= 1)      badge.style.color = '#27AE60';
    else if (val <= 2) badge.style.color = '#F1C40F';
    else               badge.style.color = '#E74C3C';
  }

  slider.addEventListener('input', () => {
    updateBadge(values[slider.value]);
  });

  // Process button
  document.getElementById('processBtn').addEventListener('click', async () => {
    const fileInput = document.getElementById('fileInput');
    if (!fileInput.files[0]) {
      alert('Please select a file first.');
      return;
    }

    const strength = values[slider.value];
    const file = fileInput.files[0];

    // Show progress
    document.getElementById('progressWrap').style.display = 'block';
    document.getElementById('downloadBtn').style.display = 'none';
    document.getElementById('resultsBox').style.display = 'none';
    document.getElementById('processBtn').disabled = true;

    const setStatus = (msg, pct) => {
      document.getElementById('statusLabel').textContent = msg;
      document.getElementById('progressBar').value = pct;
    };

    setStatus('Uploading file...', 10);

    // Build form data
    const formData = new FormData();
    formData.append('file', file);
    formData.append('strength', strength);

    try {
      setStatus('Processing — this may take a minute...', 40);

      const response = await fetch('/clean', {
        method: 'POST',
        body: formData
      });

      if (!response.ok) {
        throw new Error('Server error: ' + response.statusText);
      }

      setStatus('Saving clean audio...', 85);

      // Get the clean file as a blob
      const blob = await response.blob();
      const url  = URL.createObjectURL(blob);
      const cleanName = file.name.replace(/\.[^.]+$/, '') + '_clean.wav';

      setStatus('Done!', 100);

      // Setup download button
      const dlBtn = document.getElementById('downloadBtn');
      dlBtn.style.display = 'block';
      dlBtn.onclick = () => {
        const a = document.createElement('a');
        a.href = url;
        a.download = cleanName;
        a.click();
      };

      // Show results
      const sizeMB = (blob.size / 1048576).toFixed(2) + ' MB';
      const totalSamples = blob.size / 2;
      const secs = Math.round(totalSamples / (48000 * 2));
      const mins = Math.floor(secs / 60);
      const remSecs = secs % 60;
      const duration = mins + ' min ' + String(remSecs).padStart(2, '0') + ' sec';
      const strengthLabel = strength <= 1 ? ' (Light)' : strength <= 2 ? ' (Medium)' : ' (Strong)';

      document.getElementById('rFile').textContent = cleanName;
      document.getElementById('rSize').textContent = sizeMB;
      document.getElementById('rDuration').textContent = duration;
      document.getElementById('rStrength').textContent = strength + strengthLabel;
      document.getElementById('resultsBox').style.display = 'block';

    } catch (err) {
      setStatus('Error: ' + err.message, 0);
      alert('Something went wrong:\n' + err.message);
    }

    document.getElementById('processBtn').disabled = false;
  });
</script>
</body>
</html>
